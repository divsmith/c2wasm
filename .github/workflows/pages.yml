name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install wasi-sdk
        run: |
          WASI_SDK_VERSION=25
          curl -LO "https://github.com/WebAssembly/wasi-sdk/releases/download/wasi-sdk-${WASI_SDK_VERSION}/wasi-sdk-${WASI_SDK_VERSION}.0-x86_64-linux.tar.gz"
          tar xzf "wasi-sdk-${WASI_SDK_VERSION}.0-x86_64-linux.tar.gz"
          sudo mv "wasi-sdk-${WASI_SDK_VERSION}.0-x86_64-linux" /opt/wasi-sdk

      - name: Build compiler.wasm and assembler.wasm
        run: make

      - name: Bundle compiler source for demo
        run: |
          node tools/bundle-source.js

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload demo directory
        uses: actions/upload-pages-artifact@v3
        with:
          path: demo/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
