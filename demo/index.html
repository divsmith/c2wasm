<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>c2wasm — C to WebAssembly Compiler</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
  <header>
    <div class="header-left">
      <h1>c2wasm</h1>
      <span class="tagline">A self-hosting C compiler targeting WebAssembly</span>
    </div>
    <a href="https://github.com/divsmith/c2wasm" class="github-link" target="_blank" rel="noopener">
      <svg width="20" height="20" viewBox="0 0 16 16" fill="currentColor">
        <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38
          0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15
          -.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87
          .51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12
          0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82
          2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65
          3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013
          0 0016 8c0-4.42-3.58-8-8-8z"/>
      </svg>
      GitHub
    </a>
  </header>

  <div class="toolbar">
    <div class="mode-toggle" id="mode-toggle">
      <button class="mode-btn active" id="mode-program" title="Write and run C programs">Program</button>
      <button class="mode-btn" id="mode-compiler" title="Edit the compiler source code">Compiler</button>
    </div>
    <span class="toolbar-sep"></span>
    <div id="program-controls">
      <label class="toolbar-label" for="file-select">File:</label>
      <select id="file-select">
        <optgroup label="Examples">
          <option value="hello">Hello World</option>
          <option value="fibonacci">Fibonacci</option>
          <option value="linked_list">Linked List</option>
          <option value="sort">Bubble Sort</option>
          <option value="collatz">Collatz Sequence</option>
          <option value="weekday">Day of Week</option>
          <option value="bit_flags">Bit Flags</option>
          <option value="greet">Greet</option>
          <option value="floating_point">Float &amp; Double</option>
          <option value="integer_types">Integer Types</option>
          <option value="memory_pools">Memory &amp; free()</option>
          <option value="string_ops">String Ops</option>
          <option value="func_ptrs">Function Pointers</option>
          <option value="string_arrays">String Arrays</option>
          <option value="typedef_fnptr">Typedef Fn Ptr</option>
          <option value="compound_assign">Compound Assign</option>
          <option value="string_concat">String Concat</option>
          <option value="comma_operator">Comma Operator</option>
          <option value="storage_classes">Storage Classes</option>
          <option value="preprocessor">Preprocessor</option>
          <option value="union_types">Union Types</option>
          <option value="goto_labels">Goto &amp; Labels</option>
          <option value="func_macros">Function-like Macros</option>
          <option value="multidim_arrays">2D Arrays</option>
        </optgroup>
        <optgroup label="My Files" id="user-files-group"></optgroup>
      </select>
      <button id="new-file-btn" title="New file">＋ New</button>
      <button id="delete-file-btn" title="Delete this file">✕ Delete</button>
      <button id="run-btn" title="Ctrl+Enter">▶ Compile &amp; Run</button>
    </div>
    <div id="compiler-controls" class="hidden">
      <label class="toolbar-label" for="compiler-file-select">Source:</label>
      <select id="compiler-file-select"></select>
      <button id="build-compiler-btn" title="Ctrl+Enter">🔨 Build Compiler</button>
      <button id="reset-source-btn" title="Reset all changes">↺ Reset</button>
    </div>
    <span id="save-indicator" class="save-indicator"></span>
    <span id="compiler-mode-indicator" class="compiler-mode-indicator">Using: Reference</span>
    <span id="status"></span>
  </div>

  <main>
    <div class="editor-panel" id="editor-container"></div>
    <div class="resize-handle" id="resize-handle"></div>
    <div class="output-panel">
      <div class="console-tab-content" id="console-tab-content">
        <pre class="tab-content" id="console-output"></pre>
        <div class="terminal-input-row hidden" id="terminal-input-row">
          <span class="terminal-prompt">❯</span>
          <input type="text" id="terminal-input" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
        </div>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.45.0/min/vs/loader.js"></script>
  <script src="compiler-source.js"></script>
  <script src="compiler-api.js"></script>
  <script src="main.js"></script>
</body>
</html>
